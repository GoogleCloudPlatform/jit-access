<!doctype html>

<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <meta name="referrer" content="no-referrer" />

    <title>JIT Groups</title>

    <!-- All external resources are hosted by Google -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:regular,bold,italic,thin,light,bolditalic,black,medium&amp;lang=en">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,300,0,0" />

    <link href="mdc/material-components-web.min.css" rel="stylesheet">
    <script src="mdc/material-components-web.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="mdc-top-app-bar--fixed-adjust">
        <!-- ListGroupsView -->
        <div class='jit-view' id='jit-listgroups-view'>
            <h1>Groups</h1>
            <div class="mdc-data-table" id="jit-listgroups-table">
                <div class="mdc-data-table__table-container">
                    <table class="mdc-data-table__table">
                        <thead>
                            <tr class="mdc-data-table__header-row">
                                <th class="mdc-data-table__header-cell" role="columnheader" scope="col">Group</th>
                                <th class="mdc-data-table__header-cell" role="columnheader" scope="col">Description</th>
                                <th class="mdc-data-table__header-cell" role="columnheader" scope="col">System</th>
                                <th class="mdc-data-table__header-cell" role="columnheader" scope="col">Membership</th>
                            </tr>
                        </thead>
                        <tbody class="mdc-data-table__content">
                        </tbody>
                    </table>
                </div>

                <div class="mdc-data-table__progress-indicator">
                    <div class="mdc-data-table__scrim"></div>
                    <div class="mdc-linear-progress mdc-linear-progress--indeterminate mdc-data-table__linear-progress" role="progressbar" aria-label="Loading...">
                        <div class="mdc-linear-progress__buffer">
                            <div class="mdc-linear-progress__buffer-bar"></div>
                            <div class="mdc-linear-progress__buffer-dots"></div>
                        </div>
                        <div class="mdc-linear-progress__bar mdc-linear-progress__primary-bar">
                            <span class="mdc-linear-progress__bar-inner"></span>
                        </div>
                        <div class="mdc-linear-progress__bar mdc-linear-progress__secondary-bar">
                            <span class="mdc-linear-progress__bar-inner"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>


        <!-- GetGroupView -->
        <div class='jit-view' id='jit-getgroup-view'>
            <h1>
                <button class="mdc-icon-button material-icons" onclick="window.location.href='#!/groups'">
                    <div class="mdc-icon-button__ripple"></div>
                    arrow_back
                </button>
                <span>
                    <span id="jit-getgroup-system-name"></span>
                    <span class="jit-material-icons">chevron_right</span>
                    <span id="jit-getgroup-group-name"></span>
                </span>
            </h1>

            <div class="jit-card-subsection">
                <span id="jit-getgroup-group-description"></span>
            </div>

            <div class="jit-card-subsection">
                <h2>Join group</h2>
                Membership of this group is subject to the following constraints:
                <ul class="mdc-list" id="jit-getgroup-constraints"></ul>

                To join the group, provide the following information:
                <div id="jit-getgroup-request-form" style="margin: 20px"></div>

                <button class="mdc-button foo-button mdc-button--raised" id="jit-getgroup-request-button" type="submit">
                    <div class="mdc-button__ripple"></div>
                    <span class="mdc-button__label">Request access</span>
                </button>
            </div>

        </div>

        <!-- WaitDialog -->
        <div class="mdc-dialog" id="jit-wait-dialog">
            <div class="mdc-dialog__container">
                <div class="mdc-dialog__surface" role="alertdialog" aria-modal="true">
                    <h2 class="mdc-dialog__title">Please wait...</h2>
                    <div class="mdc-dialog__content">
                        <div role="progressbar" class="mdc-linear-progress mdc-linear-progress--indeterminate" aria-label="Progress Bar" aria-valuemin="0" aria-valuemax="1" aria-valuenow="0" id="jit-wait-dialog-progress-bar">
                            <div class="mdc-linear-progress__buffer">
                                <div class="mdc-linear-progress__buffer-bar"></div>
                                <div class="mdc-linear-progress__buffer-dots"></div>
                            </div>
                            <div class="mdc-linear-progress__bar mdc-linear-progress__primary-bar">
                                <span class="mdc-linear-progress__bar-inner"></span>
                            </div>
                            <div class="mdc-linear-progress__bar mdc-linear-progress__secondary-bar">
                                <span class="mdc-linear-progress__bar-inner"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- script -->
    <script src="model.js"></script>
    <script src="view.js"></script>
    <script>
        "use strict"

        class WaitDialog extends DialogBase {
            constructor() {
                super('#jit-wait-dialog');

                const progressBar = new mdc.linearProgress.MDCLinearProgress(document.querySelector('#jit-wait-dialog-progress-bar'));
            }
        }

        class GroupsViewBase extends ViewBase {
            constructor(selector) {
                super(selector);
            }
        }

        class ListGroupsView extends GroupsViewBase {
            constructor(model) {
                super('#jit-listgroups-view');

                console.assert(model);

                this.model = model;
                this.table = new mdc.dataTable.MDCDataTable(document.querySelector('#jit-listgroups-table'));
                this.table.clearRows();
            }

            async showAsync() {
                console.assert(document.appbar.environment);
                super.showAsync();


                try {
                    this.table.showProgress();

                    const response = await this.model.listGroups(document.appbar.environment);
                    if (response.groups && response.groups.length > 0) {
                        response.groups.forEach(item => {
                            this.table.addRow(
                                item.id,
                                [
                                    { text: item.name, icon: 'group', href: `#!/group/${item.id}` },
                                    { text: item.description, maxLength: 30 },
                                    { text: item.system.name },
                                    { text: item.access.membershipActive ? "Active" : "",
                                      icon: item.access.membershipActive ? "check" : null
                                    }
                                ],
                                false);
                        });
                    }
                }
                finally {
                    this.table.hideProgress();
                }
            }
        }

        class GetGroupView extends GroupsViewBase {
            constructor(model, groupId) {
                super('#jit-getgroup-view');

                console.assert(model);

                this.model = model;
                this.groupId = groupId;
                this.constraints = new mdc.list.MDCList(document.querySelector('#jit-getgroup-constraints'));
                this.constraints.clearRows();

                this.form = $('#jit-getgroup-request-form');
                this.form.empty();

                this.formFields = []
            }

            dateFromDuration(durationInSeconds) {
                // Cut seconds to ensure compatibility with datetime-local fields.
                return new Date(new Date().getTime() + durationInSeconds * 1000).toISOString().substring(0, 16);
            }

            addInput(input) {
                switch (input.type) {
                    case "String": {
                        const element = $(`
                            <label class="mdc-text-field mdc-text-field--outlined" id="jit-getgroup-request-form-${input.name}">
                                <span class="mdc-notched-outline">
                                    <span class="mdc-notched-outline__leading"></span>
                                    <span class="mdc-notched-outline__notch">
                                        <span class="mdc-floating-label">${input.description}</span>
                                    </span>
                                    <span class="mdc-notched-outline__trailing"></span>
                                </span>
                                <input type="text" class="mdc-text-field__input" id="jit-getgroup-request-input-${input.name}" required autocomplete="off">
                            </label>`);
                        this.form.append(element);

                        if (input.minInclusive) {
                            $(`#jit-getgroup-request-input-${input.name}`).prop('minlength', input.minInclusive);
                        }

                        if (input.maxInclusive) {
                            $(`#jit-getgroup-request-input-${input.name}`).prop('maxlength', input.maxInclusive);
                        }

                        const textField = new mdc.textField.MDCTextField(document.querySelector(`#jit-getgroup-request-form-${input.name}`));
                        this.formFields.push(textField);
                        break;
                    }
                    case "Duration": {
                        const element = $(`
                             <label class="mdc-text-field mdc-text-field--outlined" id="jit-getgroup-request-form-${input.name}">
                                 <span class="mdc-notched-outline">
                                     <span class="mdc-notched-outline__leading"></span>
                                     <span class="mdc-notched-outline__notch">
                                        <span class="mdc-floating-label">${input.description}</span>
                                     </span>
                                     <span class="mdc-notched-outline__trailing"></span>
                                 </span>
                                 <input type="datetime-local" class="mdc-text-field__input" id="jit-getgroup-request-input-${input.name}" required>
                             </label>`);
                        this.form.append(element);

                        if (input.minInclusive) {
                            $(`#jit-getgroup-request-input-${input.name}`).prop('min', this.dateFromDuration(input.minInclusive));
                        }

                        if (input.maxInclusive) {
                            $(`#jit-getgroup-request-input-${input.name}`).prop('max', this.dateFromDuration(input.maxInclusive));
                        }

                        const textField = new mdc.textField.MDCTextField(document.querySelector(`#jit-getgroup-request-form-${input.name}`));
                        this.formFields.push(textField);
                        break;
                    }

                    default:
                        break;
                }
            } 

            async showAsync() {
                super.showAsync();

                const response = await this.model.getGroup(document.appbar.environment, this.groupId);

                $('#jit-getgroup-system-name').text(response.system.name);
                $('#jit-getgroup-group-name').text(response.name);
                $('#jit-getgroup-group-description').text(response.description);

                if (response.access.satisfiedConstraints) {
                    response.access.satisfiedConstraints.forEach(item => {
                        this.constraints.addRow({
                            primary: item.description,
                            icon: 'check'
                        });
                    });
                }

                if (response.access.unsatisfiedConstraints) {
                    response.access.unsatisfiedConstraints.forEach(item => {
                        this.constraints.addRow({
                            primary: item.description,
                            icon: 'exclamation'
                        });
                    });
                }

                response.access.input.forEach(item => {
                    this.addInput(item);
                });

                $('#jit-getgroup-request-button').click(async () => {
                    try {
                        var dialog = new WaitDialog();
                        dialog.showAsync();
                        await new Promise(r => setTimeout(r, 2000));
                        dialog.close();
                        throw "NIY";
                    }
                    catch (e) {
                        if (e) {
                            document.appbar.showError(e, false);
                        }
                    }
                });
            }
        }

        async function routeToView() {
            let view;
            try {
                if (window.location.hash == "#!/groups") {
                    view = new ListGroupsView(document.appbar.model);
                    await view.showAsync();
                }
                else if (window.location.hash.startsWith("#!/group/")) {
                    view = new GetGroupView(document.appbar.model, window.location.hash.substring(9));
                    await view.showAsync();
                }
                else {
                    window.location.hash = "#!/groups";
                }
            }
            catch (e) {
                if (view) {
                    view.cancelView(e);
                }

                document.appbar.showError(e ?? "No environment selected", true);
            }
        }

        $(document).ready(async () => {
            try {
                await document.appbar.initialize();
                window.addEventListener("hashchange", routeToView);
                routeToView();
            }
            catch (e) {
                document.appbar.showError(e ?? "No environment selected", true);
            }

            // TODO: window.addEventListener("hashchange", locationHandler);
            // https://dev.to/thedevdrawer/single-page-application-routing-using-hash-or-url-9jh
        });
    </script>
  </body>
</html>
