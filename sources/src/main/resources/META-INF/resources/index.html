<!doctype html>

<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <meta name="referrer" content="no-referrer" />

    <title>JIT Groups</title>

    <!-- All external resources are hosted by Google -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:regular,bold,italic,thin,light,bolditalic,black,medium&amp;lang=en">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,300,0,0" />

    <link href="mdc/material-components-web.min.css" rel="stylesheet">
    <script src="mdc/material-components-web.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="mdc-top-app-bar--fixed-adjust">
        <!-- GroupsInfoView -->
        <div class='jit-view' id='jit-groupsinfo-view'>
            <h1>Groups</h1>
            <div class="mdc-data-table" id="jit-groupsinfo-table">
                <div class="mdc-data-table__table-container">
                    <table class="mdc-data-table__table">
                        <thead>
                            <tr class="mdc-data-table__header-row">
                                <th class="mdc-data-table__header-cell" role="columnheader" scope="col">Group</th>
                                <th class="mdc-data-table__header-cell" role="columnheader" scope="col">Description</th>
                                <th class="mdc-data-table__header-cell" role="columnheader" scope="col">System</th>
                                <th class="mdc-data-table__header-cell" role="columnheader" scope="col">Membership</th>
                            </tr>
                        </thead>
                        <tbody class="mdc-data-table__content">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>


        <!-- GroupInfoView -->
        <div class='jit-view' id='jit-groupinfo-view'>
            <h1>
                <button class="mdc-icon-button material-icons"  id='jit-groupinfo-back'>
                    <div class="mdc-icon-button__ripple"></div>
                    arrow_back
                </button>
                <span>
                    <span id="jit-groupinfo-system-name"></span>
                    <span class="jit-material-icons">chevron_right</span>
                    <span id="jit-groupinfo-group-name"></span>
                </span>
            </h1>

            <div class="jit-card-subsection">
                <span id="jit-groupinfo-group-description"></span>
                <ul class="mdc-list" id="jit-getgroups-details"></ul>
            </div>
            <div class="jit-card-subsection">
                <ul class="mdc-list" id="jit-groupinfo-constraints" title="Membership of this group is subject to the following constraints:"></ul>
            </div>

            <div class="jit-card-subsection">
                <div id="jit-groupinfo-request-form" title="To join the group, provide the following information:"></div>

                <button class="mdc-button foo-button mdc-button--raised" id="jit-groupinfo-request-button" type="submit">
                    <div class="mdc-button__ripple"></div>
                    <span class="mdc-button__label">Request access</span>
                </button>
            </div>

        </div>

        <!-- WaitDialog -->
        <div class="mdc-dialog" id="jit-wait-dialog">
            <div class="mdc-dialog__container">
                <div class="mdc-dialog__surface" role="alertdialog" aria-modal="true">
                    <h2 class="mdc-dialog__title">Please wait...</h2>
                    <div class="mdc-dialog__content">
                        <div role="progressbar" class="mdc-linear-progress mdc-linear-progress--indeterminate" aria-label="Progress Bar" aria-valuemin="0" aria-valuemax="1" aria-valuenow="0" id="jit-wait-dialog-progress-bar">
                            <div class="mdc-linear-progress__buffer">
                                <div class="mdc-linear-progress__buffer-bar"></div>
                                <div class="mdc-linear-progress__buffer-dots"></div>
                            </div>
                            <div class="mdc-linear-progress__bar mdc-linear-progress__primary-bar">
                                <span class="mdc-linear-progress__bar-inner"></span>
                            </div>
                            <div class="mdc-linear-progress__bar mdc-linear-progress__secondary-bar">
                                <span class="mdc-linear-progress__bar-inner"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- script -->
    <script src="model.js"></script>
    <script src="view.js"></script>
    <script>
        "use strict"

        class WaitDialog extends DialogBase {
            constructor() {
                super('#jit-wait-dialog');

                const progressBar = new mdc.linearProgress.MDCLinearProgress(document.querySelector('#jit-wait-dialog-progress-bar'));
            }
        }

        class GroupsViewBase extends ViewBase {
            constructor(selector) {
                super(selector);
            }
        }

        class GroupsInfoView extends GroupsViewBase {
            constructor(model) {
                super('#jit-groupsinfo-view');

                console.assert(model);

                this.table = new mdc.dataTable.MDCDataTable(document.querySelector('#jit-groupsinfo-table'));
                this.table.clearRows();

                if (model.content.groups && model.content.groups.length > 0) {
                    model.content.groups.forEach(item => {
                        this.table.addRow(
                            item.id,
                            [
                                { text: item.name, icon: 'group', href: `#!/environments/${model.environment}/groups/${item.id}` },
                                { text: item.description, maxLength: 30 },
                                { text: item.system.name },
                                { text: item.access.membershipActive ? "Active" : "",
                                    icon: item.access.membershipActive ? "check" : null
                                }
                            ],
                            false);
                    });
                }
            }
        }

        class GroupInfoView extends GroupsViewBase {
            constructor(model) {
                super('#jit-groupinfo-view');

                console.assert(model);

                this.constraints = new mdc.list.MDCList(document.querySelector('#jit-groupinfo-constraints'));
                this.constraints.clearRows();

                this.details = new mdc.list.MDCList(document.querySelector('#jit-getgroups-details'));
                this.details.clearRows();

                this.form = $('#jit-groupinfo-request-form');
                this.form.empty();

                this.formFields = []

                //
                // Details.
                //
                $('#jit-groupinfo-back').on("click", () => window.location.href=`#!/environments/${model.environment}/groups`);
                $('#jit-groupinfo-system-name').text(model.content.system.name);
                $('#jit-groupinfo-group-name').text(model.content.name);
                $('#jit-groupinfo-group-description').text(model.content.description);

                this.details.addRow({
                    icon: 'group',
                    primary: model.content.cloudIdentityGroup
                });

                if (model.content.access.membership.active) {
                    this.details.addRow({
                        icon: 'check',
                        primary: 'You currently a member of this group'
                    });
                    this.details.addRow({
                        icon: 'schedule',
                        primary: `Your membership expires on ${new Date(model.content.access.membership.expiry * 1000).toLocaleString()}`
                    });
                }
                else {
                    this.details.addRow({
                        icon: 'close',
                        primary: "You're not a member of this group"
                    });
                }

                //
                // Constraints.
                //
                if (!model.content.access.allowSelfApproval) {
                    this.constraints.addRow({
                        primary: "Membership requests are subject to approval",
                        icon: 'exclamation'
                    });
                }
                if (model.content.access.satisfiedConstraints) {
                    model.content.access.satisfiedConstraints.forEach(item => {
                        this.constraints.addRow({
                            primary: item.description,
                            icon: 'check'
                        });
                    });
                }

                if (model.content.access.unsatisfiedConstraints) {
                    model.content.access.unsatisfiedConstraints.forEach(item => {
                        this.constraints.addRow({
                            primary: item.description,
                            icon: 'exclamation'
                        });
                    });
                }

                model.content.access.input.forEach(item => {
                    this._addInput(item);
                });

                $('#jit-groupinfo-request-button').click(async () => {
                    var dialog = new WaitDialog();
                    dialog.showAsync();

                    try {
                        await model.joinGroup(
                            model.environment,
                            model.content.system.name,
                            model.content.name) // https://stackoverflow.com/questions/1960240/jquery-ajax-submit-form
                    }
                    catch (e) {
                        document.appbar.showError(e, false);
                    }
                    finally {
                        dialog.close();
                    }
                });
            }

            _dateFromDuration(durationInSeconds) {
                // Cut seconds to ensure compatibility with datetime-local fields.
                return new Date(new Date().getTime() + durationInSeconds * 1000).toISOString().substring(0, 16);
            }

            _addInput(input) {
                switch (input.type) {
                    case "String": {
                        const element = $(`
                            <label class="mdc-text-field mdc-text-field--outlined" id="jit-groupinfo-request-form-${input.name}">
                                <span class="mdc-notched-outline">
                                    <span class="mdc-notched-outline__leading"></span>
                                    <span class="mdc-notched-outline__notch">
                                        <span class="mdc-floating-label">${input.description}</span>
                                    </span>
                                    <span class="mdc-notched-outline__trailing"></span>
                                </span>
                                <input type="text" class="mdc-text-field__input" id="jit-groupinfo-request-input-${input.name}" ${input.isRequired ? 'required' : ''} autocomplete="off">
                            </label>`);
                        this.form.append(element);

                        if (input.minInclusive) {
                            $(`#jit-groupinfo-request-input-${input.name}`).prop('minlength', input.minInclusive);
                        }

                        if (input.maxInclusive) {
                            $(`#jit-groupinfo-request-input-${input.name}`).prop('maxlength', input.maxInclusive);
                        }

                        const textField = new mdc.textField.MDCTextField(document.querySelector(`#jit-groupinfo-request-form-${input.name}`));
                        this.formFields.push(textField);
                        break;
                    }
                    case "Duration": {
                        const element = $(`
                             <label class="mdc-text-field mdc-text-field--outlined" id="jit-groupinfo-request-form-${input.name}">
                                 <span class="mdc-notched-outline">
                                     <span class="mdc-notched-outline__leading"></span>
                                     <span class="mdc-notched-outline__notch">
                                        <span class="mdc-floating-label">${input.description}</span>
                                     </span>
                                     <span class="mdc-notched-outline__trailing"></span>
                                 </span>
                                 <input type="datetime-local" class="mdc-text-field__input" id="jit-groupinfo-request-input-${input.name}" required>
                             </label>`);
                        this.form.append(element);

                        if (input.minInclusive) {
                            $(`#jit-groupinfo-request-input-${input.name}`).prop('min', this._dateFromDuration(input.minInclusive));
                        }

                        if (input.maxInclusive) {
                            $(`#jit-groupinfo-request-input-${input.name}`).prop('max', this._dateFromDuration(input.maxInclusive));
                        }

                        const textField = new mdc.textField.MDCTextField(document.querySelector(`#jit-groupinfo-request-form-${input.name}`));
                        this.formFields.push(textField);
                        break;
                    }

                    default:
                        break;
                }
            } 
        }

        async function routeToView() {
            let view;
            try {
                const model = await document.appbar.loadModel();
                if (!model) {
                    return;
                }

                switch (model.content._type) {
                    case "GroupsInfo":
                        view = new GroupsInfoView(model);
                        await view.showAsync();
                        break;

                    case "GroupInfo":
                        view = new GroupInfoView(model);
                        await view.showAsync();
                        break;
                }
                
            }
            catch (e) {
                if (view) {
                    view.cancelView(e);
                }

                document.appbar.showError(e ?? "No environment selected", true);
            }
        }

        window.onhashchange = routeToView;
        $(document).ready(routeToView);
    </script>
  </body>
</html>
